name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Validação de código e testes
  test:
    runs-on: ubuntu-latest
    name: Test and Code Quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Lint with flake8
        run: |
          # Parar se houver errors de syntax
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero trata todos os errors como warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Format check with black
        run: |
          black --check --diff . || echo "Format issues found (non-blocking)"
      
      - name: Run pytest
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=html -v
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Job 2: Build da imagem Docker
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: test
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Load image for testing
        run: |
          docker load --input /tmp/image.tar
      
      - name: Test Docker image
        run: |
          # Verificar se a imagem foi criada
          docker images | grep vocabulab
          # Executar um container e testar
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest uvicorn --version

  # Job 3: Security scanning
  security:
    runs-on: ubuntu-latest
    name: Security Scanning
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Vocabulab'
          path: '.'
          format: 'JSON'
      
      - name: Upload Dependency-Check results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'dependency-check-report.sarif'

  # Job 4: Push da imagem (apenas em merge para main)
  push:
    runs-on: ubuntu-latest
    name: Push Docker Image
    needs: [build, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Create deployment annotation
        run: |
          echo "✅ Docker image published: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

  # Job 5: Notificação de sucesso
  notify:
    runs-on: ubuntu-latest
    name: Notify Success
    needs: [test, build, security]
    if: success()
    
    steps:
      - name: Pipeline Success
        run: |
          echo "✅ CI/CD Pipeline completed successfully!"
          echo "Jobs executed:"
          echo "  - Tests: PASSED ✓"
          echo "  - Docker Build: PASSED ✓"
          echo "  - Security Scan: PASSED ✓"
